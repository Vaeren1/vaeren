# Plausible Analytics — self-hosted Community Edition.
#
# Co-located mit dem Vaeren-Stack auf demselben Server.
# Eigenes Postgres + ClickHouse, eigenes Netzwerk `plausible-net`.
# Caddy proxied stats.vaeren.de → plausible:8000 (auch in plausible-net).
#
# Erstmaliges Setup:
#   cp .env.example .env
#   docker compose up -d
#   docker compose exec plausible /entrypoint.sh db createdb
#   docker compose exec plausible /entrypoint.sh db migrate
#   # Im Browser: https://stats.vaeren.de → Register Admin-User
#
# Caddy in plausible-net joinen:
#   docker network connect plausible-net caddy

services:
  plausible_db:
    image: postgres:16-alpine
    container_name: plausible-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: plausible_db
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - plausible-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - plausible-net

  plausible_events_db:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: plausible-clickhouse
    restart: unless-stopped
    volumes:
      - plausible-clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - plausible-net

  plausible:
    image: ghcr.io/plausible/community-edition:v3.0.1
    container_name: plausible
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_started
    environment:
      BASE_URL: ${BASE_URL:-https://stats.vaeren.de}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?required}
      TOTP_VAULT_KEY: ${TOTP_VAULT_KEY:?required}
      DATABASE_URL: postgres://plausible:${POSTGRES_PASSWORD}@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-true}
      MAILER_EMAIL: ${MAILER_EMAIL:-stats@vaeren.de}
    networks:
      - plausible-net

networks:
  plausible-net:
    name: plausible-net
    driver: bridge

volumes:
  plausible-postgres-data:
  plausible-clickhouse-data:

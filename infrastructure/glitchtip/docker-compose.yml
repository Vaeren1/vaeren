services:
  postgres:
    image: postgres:16-alpine
    container_name: glitchtip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s

  redis:
    image: redis:7-alpine
    container_name: glitchtip-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  web:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://glitchtip@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      PORT: "8000"
      EMAIL_URL: consolemail://
      GLITCHTIP_DOMAIN: https://errors.app.vaeren.de
      DEFAULT_FROM_EMAIL: noreply@vaeren.de
      ENABLE_OPEN_USER_REGISTRATION: "False"
      CELERY_WORKER_AUTOSCALE: "1,3"
    expose:
      - "8000"

  worker:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://glitchtip@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      EMAIL_URL: consolemail://
      DEFAULT_FROM_EMAIL: noreply@vaeren.de

  migrate:
    image: glitchtip/glitchtip:latest
    container_name: glitchtip-migrate
    depends_on:
      postgres:
        condition: service_healthy
    command: ./bin/run-migrate.sh
    environment:
      DATABASE_URL: postgres://glitchtip@postgres:5432/glitchtip
      SECRET_KEY: ${SECRET_KEY}
    restart: "no"

volumes:
  postgres_data:

networks:
  default:
    name: glitchtip-net

# Vaeren Frontend — nginx config (im Container).
# SPA-Routing: alle Routes ohne Datei-Extension fallen auf index.html zurück.
# Caddy auf dem Host proxied alle nicht-/api-Pfade hierher.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statische Assets mit Hash → langes Caching
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: für alle anderen Routes index.html (Client-Side-Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: backend

jobs:
  backend-tests:
    name: Backend tests + multi-tenant isolation gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vaeren
          POSTGRES_USER: vaeren
          POSTGRES_PASSWORD: vaeren_ci_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaeren"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      POSTGRES_DB: vaeren
      POSTGRES_USER: vaeren
      POSTGRES_PASSWORD: vaeren_ci_only
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      DJANGO_SECRET_KEY: ci-only-not-secret
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Django check
        run: uv run python manage.py check

      - name: Run all backend tests
        run: uv run pytest -v

      - name: Critical multi-tenant isolation gate
        run: uv run pytest -v -m tenant_isolation --strict-markers
